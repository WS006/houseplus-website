# 工作流名称
name: Auto Build & Deploy Frontend to GitHub Pages
# 触发条件：main分支有代码提交时运行
on:
  push:
    branches: [ main ]
    # 只监听client文件夹的修改，避免无关提交触发部署
    paths:
      - 'client/**'
      - '.github/workflows/main.yml'

# 任务定义
jobs:
  deploy:
    # 运行环境
    runs-on: ubuntu-latest
    # 适配Node.js 24版本（解决之前的弃用警告）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 解决git权限报错（exit code 128）

      # 步骤2：配置Node.js环境（匹配项目依赖）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 稳定版本，适配pnpm
          cache: 'pnpm'       # 缓存pnpm依赖，加速部署
          cache-dependency-path: 'client/pnpm-lock.yaml'

      # 步骤3：进入client目录，安装依赖
      - name: Install Dependencies
        working-directory: ./client
        run: |
          npm install -g pnpm  # 全局安装pnpm
          pnpm install --frozen-lockfile  # 锁定依赖版本，避免冲突

      # 步骤4：打包前端项目（生成dist静态文件）
      - name: Build Frontend Project
        working-directory: ./client
        run: pnpm run build
        env:
          # 打包时配置基础路径，适配自定义域名根路径
          VITE_BASE: '/'

      # 步骤5：部署dist文件夹到gh-pages分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 自动生成的权限令牌
          publish_dir: ./client/dist                 # 部署打包后的dist文件夹
          publish_branch: gh-pages                  # 部署到gh-pages分支
          # 配置git提交信息，避免权限问题
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
