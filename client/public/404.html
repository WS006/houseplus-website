<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>House Plus Group</title>
    <script>
      // GitHub Pages SPA redirect for 404 errors
      // Redirect to index.html with the path preserved as a query parameter
      var l = window.location;
      
      // Only redirect if we're not already at the index page
      if (!l.pathname.includes('index.html')) {
        // Extract the path after /House-Plus-Group/
        var pathAfterBase = l.pathname.replace('/House-Plus-Group/', '');
        
        // Redirect to index.html with the path as query parameter
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/House-Plus-Group/index.html?redirect=' + encodeURIComponent('/' + pathAfterBase)
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
