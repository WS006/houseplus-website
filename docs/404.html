<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>House Plus Group</title>
    <script>
      // GitHub Pages SPA redirect for 404 errors
      // For custom domain, we don't need the repo name in the path
      var l = window.location;
      
      // Only redirect if we're not already at the index page
      if (!l.pathname.includes('index.html')) {
        // Get the path as-is (without repo name since we're using custom domain)
        var path = l.pathname;
        
        // Redirect to index.html with the path as query parameter
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/index.html?redirect=' + encodeURIComponent(path)
        );
      }
    </script>
  </head>
  <body>
  </body>
</html>
