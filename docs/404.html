<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HousePlus - SPA</title>
    <script type="text/javascript">
      // Single Page App for GitHub Pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/\+/g, ' ');
          }).join('?');
          window.history.replaceState(null, null,
              decoded.pathname + decoded.search + decoded.hash
          );
        } else {
          var path = l.pathname.split('/').slice(1).map(function(decodeURIComponent));
          l.replace(
              l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
              l.pathname.split('/').slice(0, 1).concat('index.html').join('/') +
              '?/' + path.join('/').replace(/&/g, '~~~and~~~') +
              (l.search ? '&' + l.search.slice(1).replace(/&/g, '~~~and~~~') : '') +
              l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
  </body>
</html>
